name: Train Model

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Train model
        run: |
          cd backend
          python train_model.py

      - name: Commit updated model
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add backend/artifacts/fraud_model.joblib
          git commit -m "Auto update model" || echo "No changes"
          git push
      - name: Trigger Render Deploy
	run: curl -X POST "$
 {{secret.RENDER_DEPLOY_HOOK}}"